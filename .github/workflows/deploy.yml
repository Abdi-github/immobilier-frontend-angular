name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build:prod

  deploy:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync project files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.angular' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            ./ "$VPS_USER@$VPS_HOST:/opt/apps/${{ env.REPO_NAME }}/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            REPO="${{ env.REPO_NAME }}"
            APP_DIR="/opt/apps/$REPO"

            echo "=== Deploying $REPO ==="
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -f compose.prod.yaml ]; then
              CF="compose.prod.yaml"
            elif [ -f docker-compose.prod.yml ]; then
              CF="docker-compose.prod.yml"
            else
              CF="docker-compose.yml"
            fi

            echo "Using compose file: $CF"

            echo "Building and refreshing stack..."
            docker compose -f "$CF" up -d --build

            echo "Waiting for container state..."
            docker compose -f "$CF" ps

            docker image prune -f
            echo "✓ Deploy complete"
