name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build:prod

  deploy:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            REPO="${{ env.REPO_NAME }}"
            APP_DIR="/opt/apps/$REPO"
            APP_REPO="git@github.com:${{ github.repository }}.git"
            FIRST_DEPLOY=false

            echo "=== Deploying $REPO ==="
            mkdir -p /opt/apps

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "First deployment detected — cloning repository..."
              git clone "$APP_REPO" "$APP_DIR"
              FIRST_DEPLOY=true
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main

            if [ -f compose.prod.yaml ]; then
              CF="compose.prod.yaml"
            elif [ -f docker-compose.prod.yml ]; then
              CF="docker-compose.prod.yml"
            else
              CF="docker-compose.yml"
            fi

            echo "Using compose file: $CF"

            if docker compose -f "$CF" ps --status running -q 2>/dev/null | grep -q .; then
              WAS_RUNNING=true
            else
              WAS_RUNNING=false
            fi

            echo "Building and refreshing stack..."
            docker compose -f "$CF" up -d --build

            if [ "$FIRST_DEPLOY" = true ]; then
              echo "First deployment — leaving stack running so Traefik can register the router and issue TLS"
            elif [ "$WAS_RUNNING" = false ]; then
              echo "Stack was previously stopped — returning it to sleeping state for Sablier"
              docker compose -f "$CF" stop
            fi

            docker image prune -f
            echo "✓ Deploy complete"
