services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: immobilier_frontend_angular_dev
    ports:
      - "4203:4200"
    restart: unless-stopped
    volumes:
      - ./src:/app/src:cached
      - ./public:/app/public:cached
      - ./angular.json:/app/angular.json:cached
      - ./package.json:/app/package.json:cached
      - ./package-lock.json:/app/package-lock.json:cached
      - ./tsconfig.json:/app/tsconfig.json:cached
      - ./tsconfig.app.json:/app/tsconfig.app.json:cached
      - ./tsconfig.spec.json:/app/tsconfig.spec.json:cached
      - ./proxy.conf.docker.json:/app/proxy.conf.docker.json:cached
      - ./postcss.config.js:/app/postcss.config.js:cached
      - ./postcss.config.json:/app/postcss.config.json:cached
      - ./tailwind.config.js:/app/tailwind.config.js:cached
      - ./eslint.config.js:/app/eslint.config.js:cached
      - angular_node_modules:/app/node_modules
    networks:
      - immobilier_network

networks:
  immobilier_network:
    external: true

volumes:
  angular_node_modules:
    name: immobilier_frontend_angular_node_modules_dev
